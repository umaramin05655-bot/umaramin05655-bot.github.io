<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Wix Clone (MVP Builder)</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
}

/* LEFT PANEL */
#panel{
  width:250px;
  background:#111827;
  color:white;
  padding:10px;
}

.btn{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  cursor:pointer;
  background:#4F46E5;
  color:white;
  border-radius:8px;
}

/* CANVAS */
#canvas{
  flex:1;
  background:#f4f6fb;
  padding:20px;
  overflow:auto;
}

.block{
  padding:15px;
  margin:10px 0;
  background:white;
  border:2px dashed #ccc;
  cursor:move;
}

/* ELEMENTS */
h1,h2,p{
  margin:0;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="panel">
<h2>🧩 Builder</h2>

<button class="btn" onclick="addText()">Add Text</button>
<button class="btn" onclick="addHeading()">Add Heading</button>
<button class="btn" onclick="addImage()">Add Image</button>
<button class="btn" onclick="save()">Save</button>
<button class="btn" onclick="load()">Load</button>
<button class="btn" onclick="exportHTML()">Export HTML</button>
</div>

<div id="canvas"></div>

<script>

let canvas=document.getElementById("canvas");

/* ADD BLOCKS */
function addText(){
  let div=document.createElement("div");
  div.className="block";
  div.contentEditable=true;
  div.innerText="Write your text here...";
  canvas.appendChild(div);
}

function addHeading(){
  let div=document.createElement("h1");
  div.className="block";
  div.contentEditable=true;
  div.innerText="Heading...";
  canvas.appendChild(div);
}

function addImage(){
  let url=prompt("Image URL paste karo:");
  let img=document.createElement("img");
  img.src=url;
  img.style.width="100%";
  img.className="block";
  canvas.appendChild(img);
}

/* SAVE */
function save(){
  localStorage.setItem("site",canvas.innerHTML);
  alert("Saved ✔");
}

/* LOAD */
function load(){
  canvas.innerHTML=localStorage.getItem("site") || "";
}

/* EXPORT HTML */
function exportHTML(){
  let html = `
  <html>
  <head><title>My Website</title></head>
  <body>${canvas.innerHTML}</body>
  </html>
  `;

  let blob = new Blob([html], {type:"text/html"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "website.html";
  a.click();
}

load();

</script>

</body>
</html>
