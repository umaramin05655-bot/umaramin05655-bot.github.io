<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friendbook PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input,textarea{
  width:250px;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  background:#1877f2;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* APP */
#app{display:none}

/* TOP */
.top{
  background:#111827;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* PROFILE */
.profile{
  padding:10px;
  background:#111827;
  margin:10px;
  border-radius:10px;
}

/* POST BOX */
.postBox{
  padding:10px;
  background:#111827;
  margin:10px;
  border-radius:10px;
}

/* FEED */
.post{
  background:white;
  color:black;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.like{
  color:#1877f2;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>💙 Friendbook PRO</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login / Signup</button>
</div>

<!-- APP -->
<div id="app">

<div class="top">
<b>Friendbook PRO</b>
<button onclick="logout()">Logout</button>
</div>

<!-- PROFILE -->
<div class="profile">
<h3>Create Profile</h3>
<input id="name" placeholder="Your Name">
<input id="photo" placeholder="Photo URL">
<button onclick="saveProfile()">Save Profile</button>
</div>

<!-- POST -->
<div class="postBox">
<textarea id="text" placeholder="What's on your mind?"></textarea>
<button onclick="post()">Post</button>
</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;

/* LOGIN */
function login(){
  let e=document.getElementById("email").value;
  let p=document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(e,p)
  .then(u=>start(u.user))
  .catch(()=>{
    auth.createUserWithEmailAndPassword(e,p)
    .then(u=>start(u.user));
  });
}

function start(u){
  user=u;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  loadPosts();
}

/* PROFILE */
function saveProfile(){
  db.collection("users").doc(user.uid).set({
    name:document.getElementById("name").value,
    photo:document.getElementById("photo").value
  });

  alert("Profile saved ✔");
}

/* POST */
function post(){
  db.collection("posts").add({
    uid:user.uid,
    text:document.getElementById("text").value,
    likes:0,
    time:Date.now()
  });

  document.getElementById("text").value="";
  loadPosts();
}

/* LOAD POSTS */
function loadPosts(){
  let feed=document.getElementById("feed");
  feed.innerHTML="";

  db.collection("posts").orderBy("time","desc")
  .get().then(snap=>{
    snap.forEach(doc=>{
      let p=doc.data();

      feed.innerHTML += `
        <div class="post">
          <p>${p.text}</p>
          <span class="like" onclick="like('${doc.id}',${p.likes})">
            👍 Like (${p.likes})
          </span>
        </div>
      `;
    });
  });
}

/* LIKE */
function like(id,likes){
  db.collection("posts").doc(id).update({
    likes:likes+1
  });

  loadPosts();
}

/* LOGOUT */
function logout(){
  auth.signOut();
  location.reload();
}

</script>

</body>
</html>
