<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umar Amin | Ultra Pro Max Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:rgba(17,24,39,0.85);
  --text:#ffffff;
  --primary:#4F46E5;
  --glow:0 0 25px rgba(79,70,229,0.7);
}

.light{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
  scroll-behavior:smooth;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* BACKGROUND GRADIENT ANIMATION */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(79,70,229,0.3),transparent 40%),
             radial-gradient(circle,rgba(16,185,129,0.2),transparent 40%);
  animation:move 10s infinite alternate;
  z-index:-2;
}

@keyframes move{
  from{transform:translate(-10%,-10%);}
  to{transform:translate(10%,10%);}
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  width:140px;
  height:140px;
  border-radius:50%;
  border:4px solid var(--primary);
  box-shadow:var(--glow);
  margin-bottom:15px;
}

.hero h1{
  font-size:42px;
}

.hero span{
  color:var(--primary);
}

.typing{
  margin-top:10px;
  opacity:0.8;
}

/* SECTION */
section{
  padding:80px 20px;
  max-width:1000px;
  margin:auto;
}

/* CARD */
.card{
  background:var(--card);
  padding:25px;
  border-radius:18px;
  margin-top:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  transform:translateY(40px);
  opacity:0;
  transition:0.6s;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

/* SKILLS */
.skill{
  margin:12px 0;
}

.bar{
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:10px;
  background:var(--primary);
  width:0;
  animation:fill 2s forwards;
}

@keyframes fill{
  to{width:var(--w);}
}

/* PROJECTS 3D */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.project{
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
  transform-style:preserve-3d;
}

.project:hover{
  transform:rotateY(10deg) rotateX(10deg) scale(1.05);
  box-shadow:var(--glow);
}

/* BUTTON */
.btn{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:12px;
  cursor:pointer;
  margin-top:10px;
  box-shadow:var(--glow);
}

/* CONTACT */
input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  color:white;
  box-shadow:0 0 20px #25D366;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:var(--primary);
  color:white;
  margin-top:30px;
}
</style>
</head>

<body>

<nav>
<div><b>Umar Amin</b></div>
<div>
<a href="#home">Home</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
<button onclick="toggle()">🌙</button>
</div>
</nav>

<!-- HERO -->
<section id="home" class="hero">
<img src="umi.jpg" alt="profile">

<h1>Hi, I'm <span>Umar Amin</span></h1>
<div class="typing" id="typing"></div>

<button class="btn" onclick="downloadCV()">📄 Download CV</button>
</section>

<!-- SKILLS -->
<section id="skills">
<h2>Skills</h2>

<div class="card">
<div class="skill">HTML<div class="bar"><div class="fill" style="--w:95%"></div></div></div>
<div class="skill">CSS<div class="bar"><div class="fill" style="--w:90%"></div></div></div>
<div class="skill">JavaScript<div class="bar"><div class="fill" style="--w:88%"></div></div></div>
<div class="skill">React<div class="bar"><div class="fill" style="--w:75%"></div></div></div>
</div>
</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Projects</h2>

<div class="card grid">
<div class="project">Portfolio Website</div>
<div class="project">Calculator App</div>
<div class="project">Login UI</div>
<div class="project">Student System</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>

<div class="card">
<input placeholder="Your Name">
<input placeholder="Your Email">
<textarea placeholder="Message"></textarea>
<button class="btn">Send Message</button>
</div>
</section>

<footer>
© 2026 Umar Amin | Ultra Pro Max Portfolio
</footer>

<a class="whatsapp" href="https://wa.me/923277269576">💬</a>

<script>

/* DARK MODE */
function toggle(){
  document.body.classList.toggle("light");
}

/* TYPING */
let text="Frontend Developer | UI Designer | Freelancer";
let i=0;

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type,70);
  }
}
type();

/* CV DOWNLOAD */
function downloadCV(){
  let a=document.createElement("a");
  a.href="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
  a.download="Umar_CV.pdf";
  a.click();
}

/* SCROLL ANIMATION */
const cards=document.querySelectorAll(".card");

window.addEventListener("scroll",()=>{
  cards.forEach(c=>{
    if(c.getBoundingClientRect().top < window.innerHeight - 80){
      c.classList.add("show");
    }
  });
});

</script>

</body>
</html>
