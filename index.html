<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umar Amin | Ultra Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#ffffff;
  --primary:#4F46E5;
}

.light{
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
  scroll-behavior:smooth;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
  overflow-x:hidden;
}

/* PARTICLES */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(79,70,229,0.9);
  backdrop-filter:blur(10px);
  color:white;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:40px;
}

.hero span{
  color:var(--primary);
}

/* CARD */
section{
  padding:80px 20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:15px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* SKILLS BAR */
.skill{
  margin:10px 0;
}

.bar{
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:10px;
  background:var(--primary);
  width:0;
  animation:fill 2s forwards;
}

@keyframes fill{
  to{width:var(--w);}
}

/* BUTTONS */
.btn{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:var(--primary);
  color:white;
}

/* TYPING */
.typing{
  font-size:18px;
  color:#cbd5e1;
  margin-top:10px;
}

/* FLOAT BUTTON */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:12px;
  border-radius:50%;
  font-size:20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
<div><b>Umar Amin</b></div>

<div>
<a href="#home">Home</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
<button onclick="toggle()">🌙</button>
</div>
</nav>

<!-- HERO -->
<section id="home" class="hero">
<h1>Hi, I'm <span>Umar Amin</span></h1>
<div class="typing" id="typing"></div>

<button class="btn" onclick="downloadCV()">📄 Download CV</button>
</section>

<!-- SKILLS -->
<section id="skills">
<h2>Skills</h2>

<div class="card">
<div class="skill">HTML<div class="bar"><div class="fill" style="--w:95%"></div></div></div>
<div class="skill">CSS<div class="bar"><div class="fill" style="--w:90%"></div></div></div>
<div class="skill">JavaScript<div class="bar"><div class="fill" style="--w:85%"></div></div></div>
<div class="skill">React<div class="bar"><div class="fill" style="--w:70%"></div></div></div>
</div>
</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Projects</h2>
<div class="card">
<p>✔ Portfolio Website</p>
<p>✔ Calculator App</p>
<p>✔ Login UI System</p>
<p>✔ Student Dashboard</p>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>
<div class="card">
<p>Email: umaramin05655@gmail.com</p>
<p>Phone: +92 3277269576</p>
</div>
</section>

<footer>
© 2026 Umar Amin Portfolio
</footer>

<a class="whatsapp" href="https://wa.me/923277269576">💬</a>

<script>

/* DARK MODE */
function toggle(){
  document.body.classList.toggle("light");
}

/* TYPING EFFECT */
let text="Frontend Developer | Web Designer | Programmer";
let i=0;

function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type,80);
  }
}
type();

/* CV DOWNLOAD */
function downloadCV(){
  let a=document.createElement("a");
  a.href="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
  a.download="Umar_CV.pdf";
  a.click();
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*3
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
